size:
  number_byte:     {foreground: {RGB: {r: 126, g: 156, b: 216}}} # #7e9cd8
  number_kibibyte: {foreground: {RGB: {r: 126, g: 156, b: 216}}}
  number_mebibyte: {foreground: {RGB: {r: 255, g: 160, b: 102}}} # #ffa066 orange
  number_gibibyte: {foreground: {RGB: {r: 195, g: 64,  b: 67}}}  # red for big files

date:
  hour_old:   {foreground: {RGB: {r: 114, g: 113, b: 105}}} # muted old dates
  day_old:    {foreground: {RGB: {r: 150, g: 147, b: 135}}}
  newer:      {foreground: {RGB: {r: 220, g: 215, b: 186}}} # fuji white for recent
