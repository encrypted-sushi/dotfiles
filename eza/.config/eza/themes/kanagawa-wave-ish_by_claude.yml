filekinds:
  normal: {foreground: {Fixed: 250}}
  directory: {foreground: {RGB: {r: 126, g: 156, b: 216}}}   # wave blue #7e9cd8
  symlink: {foreground: {RGB: {r: 106, g: 153, b: 85}}}
  executable: {foreground: {RGB: {r: 118, g: 148, b: 106}}}  # wave green

perms:
  user_read:    {foreground: {RGB: {r: 126, g: 156, b: 216}}} # wave blue  - read
  user_write:   {foreground: {RGB: {r: 255, g: 160, b: 102}}} # peach      - write
  user_exec:    {foreground: {RGB: {r: 118, g: 148, b: 106}}} # wave green - exec
  group_read:   {foreground: {RGB: {r: 84,  g: 109, b: 151}}} # dim blue
  group_write:  {foreground: {RGB: {r: 178, g: 112, b: 71}}}  # dim peach
  group_exec:   {foreground: {RGB: {r: 82,  g: 103, b: 74}}}  # dim green
  other_read:   {foreground: {RGB: {r: 54,  g: 70,  b: 98}}}  # very dim
  other_write:  {foreground: {RGB: {r: 54,  g: 70,  b: 98}}}
  other_exec:   {foreground: {RGB: {r: 54,  g: 70,  b: 98}}}
 
